name: Run LLM Evals

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache sentence-transformers model
      uses: actions/cache@v3
      with:
        path: ~/.cache/huggingface
        key: huggingface-all-MiniLM-L6-v2

    - name: Install dependencies
      run: |
        pip install groq python-dotenv sentence-transformers

    - name: Run eval suite
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python evaluator.py